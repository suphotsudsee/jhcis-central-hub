<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHCIS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container py-4">
        <div class="row justify-content-center mb-4" id="adminLoginSection">
            <div class="col-lg-5">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Admin Login</h5>
                    </div>
                    <div class="card-body">
                        <form id="adminLoginForm">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="adminEmail" value="admin@ubonlocal.go.th" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="adminPassword" value="admin123" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">เข้าสู่ระบบ</button>
                        </form>
                        <div class="alert alert-danger mt-3 mb-0" id="loginResult" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="adminApp" style="display:none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="mb-1">JHCIS Admin</h1>
                    <p class="text-muted mb-0">จัดการหน่วยบริการและ API key</p>
                </div>
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-primary" href="index.html">กลับหน้า Dashboard</a>
                    <a class="btn btn-outline-secondary" href="queries.html">จัดการ Query</a>
                    <button class="btn btn-outline-danger" id="logoutBtn">Logout</button>
                    <button class="btn btn-primary" id="refreshFacilitiesBtn">รีเฟรช</button>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">เพิ่มหน่วยบริการ</h5>
                        </div>
                        <div class="card-body">
                            <form id="facilityForm">
                                <div class="mb-3">
                                    <label class="form-label">hcode</label>
                                    <input class="form-control" id="facilityHcode" maxlength="11" placeholder="เช่น 03633" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">ชื่อหน่วยบริการ</label>
                                    <input class="form-control" id="facilityName" placeholder="เช่น รพ.สต.ตบหู" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">สถานะ</label>
                                    <select class="form-select" id="facilityStatus">
                                        <option value="active">active</option>
                                        <option value="inactive">inactive</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">API Key (ปล่อยว่างให้ระบบสร้าง)</label>
                                    <input class="form-control" id="facilityApiKey" placeholder="jhcis_xxx">
                                </div>
                                <button type="submit" class="btn btn-success w-100">บันทึก</button>
                            </form>
                            <div class="alert alert-info mt-3 mb-0" id="formResult" style="display:none;"></div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">รายการหน่วยบริการ</h5>
                            <span class="badge bg-primary" id="facilityCount">0</span>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0" id="adminFacilitiesTable">
                                    <thead>
                                        <tr>
                                            <th>hcode</th>
                                            <th>ชื่อหน่วย</th>
                                            <th>สถานะ</th>
                                            <th>API Key</th>
                                            <th>อัปเดตล่าสุด</th>
                                            <th>จัดการ</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editFacilityModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form id="editFacilityForm">
                    <div class="modal-header">
                        <h5 class="modal-title">แก้ชื่อหน่วยบริการ</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="editFacilityHcode">
                        <input type="hidden" id="editFacilityStatus">
                        <div class="mb-3">
                            <label class="form-label">hcode</label>
                            <input class="form-control" id="editFacilityHcodeDisplay" disabled>
                        </div>
                        <div class="mb-0">
                            <label class="form-label">ชื่อหน่วยบริการ</label>
                            <input class="form-control" id="editFacilityName" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">ยกเลิก</button>
                        <button type="submit" class="btn btn-primary">บันทึก</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
